<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light only">
    <title>Sistema de Presupuestos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { color-scheme: light only; }
        body { background-color: #f8f9fa !important; color: #000000 !important; }
        .form-card { transition: transform 0.2s; cursor: pointer; }
        .form-card:hover { transform: translateY(-5px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <header class="bg-white py-3 shadow-sm">
        <div class="container text-center">
            <h2 class="mb-0">Sistema de Presupuestos</h2>
            <small class="text-muted">Talleres Mecánicos</small>
        </div>
    </header>

    <div class="container py-5">
        <h4 class="text-center text-muted mb-5">Selecciona una taller</h4>
        <div class="row g-4 justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card form-card h-100" onclick="window.location.href='formularios/presupuesto/presupuesto.html'">
                    <div class="card-body text-center py-5">
                        <img src="assets/images/logo-maxitaller-v2.png" alt="Maxi Taller" style="max-height:80px; margin-bottom:12px;">
                        <h5 class="card-title">Presupuesto MaxiTaller</h5>
                        <p class="card-text text-muted">Crear presupuesto con cálculo de costos</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-4">
                <div class="card form-card h-100" onclick="window.location.href='formularios/suscars/suscars.html'">
                    <div class="card-body text-center py-5">
                        <img src="assets/images/suscars-logo.jpg" alt="Suscars" style="max-height:80px; margin-bottom:12px;">
                        <h5 class="card-title">Presupuesto Suscars</h5>
                        <p class="card-text text-muted">Crear presupuesto con cálculo de costos</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
